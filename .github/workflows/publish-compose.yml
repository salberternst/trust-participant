name: Publish Compose and Init Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "OCI tag to publish, for example 0.1.0"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker compose version

      - name: Validate init script syntax
        run: sh -n init/participant-init.sh

      - name: Compute artifact references
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          set -euo pipefail
          IMAGE_NAME="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_TAG}" ]; then
              VERSION="${INPUT_TAG}"
            else
              VERSION="manual-${GITHUB_SHA::12}"
            fi
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "image=ghcr.io/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "init_image=ghcr.io/${IMAGE_NAME}-init" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate Compose model
        env:
          PARTICIPANT_INIT_IMAGE: ${{ steps.meta.outputs.init_image }}:${{ steps.meta.outputs.version }}
        run: docker compose --env-file .env.example config

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build init image
        run: docker build -f init/Dockerfile -t "${{ steps.meta.outputs.init_image }}:${{ steps.meta.outputs.version }}" init

      - name: Publish versioned init image
        run: docker push "${{ steps.meta.outputs.init_image }}:${{ steps.meta.outputs.version }}"

      - name: Publish latest init image
        if: github.event_name == 'push'
        run: |
          docker tag "${{ steps.meta.outputs.init_image }}:${{ steps.meta.outputs.version }}" "${{ steps.meta.outputs.init_image }}:latest"
          docker push "${{ steps.meta.outputs.init_image }}:latest"

      - name: Publish versioned Compose artifact
        env:
          PARTICIPANT_INIT_IMAGE: ${{ steps.meta.outputs.init_image }}:${{ steps.meta.outputs.version }}
        run: docker compose --env-file .env.example publish -y "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"

      - name: Publish latest Compose artifact
        if: github.event_name == 'push'
        env:
          PARTICIPANT_INIT_IMAGE: ${{ steps.meta.outputs.init_image }}:latest
        run: docker compose --env-file .env.example publish -y "${{ steps.meta.outputs.image }}:latest"
