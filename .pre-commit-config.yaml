minimum_pre_commit_version: "3.0.0"

repos:
  - repo: local
    hooks:
      - id: portal-gateway-format
        name: portal-gateway format
        entry: bash -c 'cd portal-gateway && npm run format'
        language: system
        pass_filenames: false
        files: ^portal-gateway/

      - id: portal-gateway-lint
        name: portal-gateway lint
        entry: bash -c 'cd portal-gateway && npm run lint'
        language: system
        pass_filenames: false
        files: ^portal-gateway/

      - id: shell-syntax
        name: shell syntax
        entry: tools/scripts/check-shell-syntax.sh
        language: system
        files: ^(init/participant-init\.sh|tools/scripts/.*\.sh)$
