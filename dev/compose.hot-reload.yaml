services:
  portal-gateway:
    image: node:22-alpine
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -eu
        sha256sum package-lock.json > /tmp/package-lock.hash
        if [ ! -f node_modules/.package-lock.hash ] || ! cmp -s /tmp/package-lock.hash node_modules/.package-lock.hash; then
          npm ci
          cp /tmp/package-lock.hash node_modules/.package-lock.hash
        fi
        npm run start &
        exec npm run dev -- --host 0.0.0.0
    environment:
      NODE_ENV: development
      ONBOARDING_AUTO_SUBMIT: "${DEV_ONBOARDING_AUTO_SUBMIT:-false}"
    ports:
      - "${PORTAL_GATEWAY_API_BIND:-127.0.0.1}:${PORTAL_GATEWAY_API_HOST_PORT:-3000}:3000"
      - "${PORTAL_GATEWAY_VITE_BIND:-127.0.0.1}:${PORTAL_GATEWAY_VITE_HOST_PORT:-5174}:5174"
    volumes:
      - ./portal-gateway:/workspace
      - portal-gateway-node-modules:/workspace/node_modules

  internal-gateway:
    configs:
      - source: nginx-participant-internal-dev
        target: /etc/nginx/conf.d/default.conf

configs:
  nginx-participant-internal-dev:
    content: |
      server {
          listen 80;
          server_name ${PARTICIPANT_INTERNAL_HOST:-participant.internal.test} ${PARTICIPANT_PORTAL_INTERNAL_HOST:-portal.internal.test} _;

          location /management/ {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-controlplane:8081/management/;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }

          location /catalog/ {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-controlplane:8082/catalog/;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }

          location /api/identity/ {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-identityhub:8082/api/identity/;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }

          location /identity/ {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-identityhub:8082/api/identity/;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }

          location /.well-known/api/ {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-controlplane:8085/.well-known/api/;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }

          location /health {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-portal-gateway:3000/health;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }

          location /api/onboarding/ {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-portal-gateway:3000/api/onboarding/;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }

          location /config.js {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-portal-gateway:3000/config.js;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }

          location / {
              proxy_pass http://${PARTICIPANT_ROLE:-participant}-portal-gateway:5174;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }

volumes:
  portal-gateway-node-modules:
